# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Automates the full Changesets release cycle. When a changeset is
#           merged to main, opens a "Version Packages" PR. When that PR is
#           merged, publishes all changed packages to npm.
# Triggers: push to main only
# Paths:    .changeset/** and packages/sdk/package.json
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - 'packages/sdk/package.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_PAT }}

      - name: Install pnpm
        uses: pnpm/action-setup@fe02b74f3b4a5a8605f988b4c83c31faf2e897ef # v4.0.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.1.2
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release PR or publish
        uses: changesets/action@aba318e9165b45b7948c60273ab0d1a1d41ea13b # v1.4.7
        with:
          publish: pnpm release
          version: pnpm version
          commit: 'chore: release'
          title: 'chore: release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

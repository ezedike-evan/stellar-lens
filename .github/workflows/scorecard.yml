# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Runs the OpenSSF Scorecard supply chain security analysis. Scores
#           the repository across 19 security dimensions and uploads results
#           to GitHub's security dashboard.
# Triggers: push to main (no path filter), weekly on Monday at 06:00 UTC
# Paths:    None — always runs on main pushes and weekly schedule
# ─────────────────────────────────────────────────────────────────────────────

name: Scorecard

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  id-token: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          publish_results: true

      - name: Upload results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@65c74964a9ed8c44ed2f7d6f9f5491c4bd3c28d4 # v3.28.x
        with:
          sarif_file: results.sarif

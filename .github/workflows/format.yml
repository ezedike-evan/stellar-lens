# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Enforces Prettier formatting. Fails if any source or test file is
#           not correctly formatted. Check mode only — never auto-fixes.
# Triggers: push to main/develop, pull_request targeting main
# Paths:    SDK source files, test files, Prettier config, this workflow file
# ─────────────────────────────────────────────────────────────────────────────

name: Format

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'packages/sdk/src/**/*.ts'
      - 'packages/sdk/tests/**/*.ts'
      - '.prettierrc'
      - '.prettierignore'
      - '.github/workflows/format.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/sdk/src/**/*.ts'
      - 'packages/sdk/tests/**/*.ts'
      - '.prettierrc'
      - '.prettierignore'
      - '.github/workflows/format.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@fe02b74f3b4a5a8605f988b4c83c31faf2e897ef # v4.0.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.1.2
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: |
          pnpm prettier --check \
            'packages/sdk/src/**/*.ts' \
            'packages/sdk/tests/**/*.ts'

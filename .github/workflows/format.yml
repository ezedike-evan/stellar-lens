# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Enforces Prettier formatting. Fails if any source or test file is
#           not correctly formatted. Check mode only — never auto-fixes.
# Triggers: push to main/develop, pull_request targeting main
# Paths:    SDK source files, test files, Prettier config, this workflow file
# ─────────────────────────────────────────────────────────────────────────────

name: Format

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'packages/sdk/src/**/*.ts'
      - 'packages/sdk/tests/**/*.ts'
      - '.prettierrc'
      - '.prettierignore'
      - '.github/workflows/format.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/sdk/src/**/*.ts'
      - 'packages/sdk/tests/**/*.ts'
      - '.prettierrc'
      - '.prettierignore'
      - '.github/workflows/format.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: |
          pnpm prettier --check \
            'packages/sdk/src/**/*.ts' \
            'packages/sdk/tests/**/*.ts'

# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Runs GitHub CodeQL static analysis on TypeScript source files to
#           detect security vulnerabilities in the codebase itself.
# Triggers: push to main (source files only), pull_request targeting main
#           (source files only), weekly schedule on Sunday at 02:00 UTC
# Paths:    packages/sdk/src/**/*.ts (push/PR only — schedule ignores paths)
# ─────────────────────────────────────────────────────────────────────────────

name: CodeQL

on:
  push:
    branches:
      - main
    paths:
      - 'packages/sdk/src/**/*.ts'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/sdk/src/**/*.ts'
  schedule:
    - cron: '0 2 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3.28.x
        with:
          languages: javascript-typescript
          build-mode: none
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3.28.x
        with:
          category: '/language:javascript-typescript'

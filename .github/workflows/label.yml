# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Automatically labels pull requests based on which files were
#           changed. Helps maintainers triage and prioritise PRs at a glance.
# Triggers: pull_request_target — opened, reopened, synchronize
# Paths:    None — needs to see all changed files to assign correct labels
# ─────────────────────────────────────────────────────────────────────────────

name: Label

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels based on changed files
        uses: actions/labeler@v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

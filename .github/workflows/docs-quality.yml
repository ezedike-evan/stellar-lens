# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Keeps the docs honest. Verifies documented imports resolve to real
#           SDK exports, and that the generated error reference and TypeDoc API
#           reference are regenerated and committed (no drift from source).
# Triggers: pull_request targeting main
# Paths:    SDK source, docs content, and the generators
# ─────────────────────────────────────────────────────────────────────────────

name: Docs Quality

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/sdk/src/**/*.ts'
      - 'packages/demo/content/**/*.md'
      - 'packages/demo/lib/reference-routes.ts'
      - 'scripts/gen-error-reference.ts'
      - 'scripts/gen-api-reference.mjs'
      - 'scripts/check-doc-examples.mjs'
      - '.github/workflows/docs-quality.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Docs in sync with source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify documented imports resolve
        run: pnpm docs:test

      - name: Regenerate error + API reference
        run: |
          pnpm docs:errors
          pnpm docs:api

      - name: Fail if generated docs are stale
        run: |
          git diff --exit-code -- \
            packages/demo/content/reference.md \
            packages/demo/content/reference \
            packages/demo/content/api/error-reference.md \
            packages/demo/lib/reference-routes.ts \
          || (echo "::error::Generated docs are out of date. Run 'pnpm docs:gen' and commit." && exit 1)

# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Detects performance regressions in RPC routing and simulation
#           logic. Runs latency benchmarks against Soroban testnet and
#           compares results against the main branch baseline.
#           Fails if any metric regresses by more than 20%.
# Triggers: pull_request targeting main
# Paths:    packages/sdk/src/rpc/**, packages/sdk/src/simulation/**,
#           this workflow file
# ─────────────────────────────────────────────────────────────────────────────

name: Benchmark

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/sdk/src/rpc/**/*.ts'
      - 'packages/sdk/src/simulation/**/*.ts'
      - '.github/workflows/benchmark.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@fe02b74f3b4a5a8605f988b4c83c31faf2e897ef # v4.0.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.1.2
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run benchmarks on PR branch
        run: pnpm --filter stellar-lens vitest bench --reporter=json > /tmp/bench-pr.json

      - name: Upload PR benchmark results
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68cf7e19c021d4778f0428a # v4.6.1
        with:
          name: bench-pr
          path: /tmp/bench-pr.json

      - name: Checkout main branch
        run: git checkout main

      - name: Run benchmarks on main branch
        run: pnpm --filter stellar-lens vitest bench --reporter=json > /tmp/bench-main.json

      - name: Upload main benchmark results
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68cf7e19c021d4778f0428a # v4.6.1
        with:
          name: bench-main
          path: /tmp/bench-main.json

      - name: Compare results and check for regressions
        id: compare
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const main = JSON.parse(fs.readFileSync('/tmp/bench-main.json', 'utf8'));
          const pr = JSON.parse(fs.readFileSync('/tmp/bench-pr.json', 'utf8'));

          const REGRESSION_THRESHOLD = 0.20;
          let regressions = 0;
          let rows = '| Metric | Baseline (ms) | PR (ms) | Delta | Status |\n';
          rows += '|--------|--------------|---------|-------|--------|\n';

          const mainResults = {};
          const prResults = {};

          function extractResults(data, target) {
            if (data?.testResults) {
              for (const suite of data.testResults) {
                for (const bench of (suite.benchmarks || [])) {
                  target[bench.name] = bench.mean;
                }
              }
            }
          }

          extractResults(main, mainResults);
          extractResults(pr, prResults);

          for (const [name, baselineMean] of Object.entries(mainResults)) {
            const prMean = prResults[name];
            if (prMean === undefined) continue;
            const delta = (prMean - baselineMean) / baselineMean;
            const deltaStr = (delta >= 0 ? '+' : '') + (delta * 100).toFixed(2) + '%';
            const passed = delta <= REGRESSION_THRESHOLD;
            if (!passed) regressions++;
            rows += `| ${name} | ${baselineMean.toFixed(2)} | ${prMean.toFixed(2)} | ${deltaStr} | ${passed ? '✅' : '❌'} |\n`;
          }

          const summary = `### Benchmark Results\n\n${rows}\n${regressions > 0 ? `\n⚠️ **${regressions} regression(s) detected — threshold: 20%**` : '\n✅ No regressions detected.'}`;
          fs.writeFileSync('/tmp/bench-summary.md', summary);
          fs.writeFileSync(process.env.GITHUB_OUTPUT || '/dev/null', `regressions=${regressions}\n`, { flag: 'a' });
          if (regressions > 0) process.exit(1);
          EOF

      - name: Post benchmark comment
        uses: marocchino/sticky-pull-request-comment@52423e84c5db7ba852ec7f85ac5901c2820c65f0 # v2.9.0
        if: always()
        with:
          header: benchmark
          path: /tmp/bench-summary.md

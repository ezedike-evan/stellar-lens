# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Detects performance regressions in RPC routing and simulation
#           logic by comparing PR benchmarks against the main-branch baseline.
#           Fails if any metric regresses by more than 20%.
#
#           No benchmark files exist yet (no *.bench.ts), so the job detects
#           that and passes as a clean no-op. As soon as a *.bench.ts is added
#           under packages/sdk, the full comparison runs automatically.
# Triggers: pull_request targeting main
# Paths:    packages/sdk/src/rpc/**, packages/sdk/src/simulation/**,
#           benchmark files, this workflow file
# ─────────────────────────────────────────────────────────────────────────────

name: Benchmark

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/sdk/src/rpc/**/*.ts'
      - 'packages/sdk/src/simulation/**/*.ts'
      - 'packages/sdk/**/*.bench.ts'
      - '.github/workflows/benchmark.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Detect benchmark files
        id: detect
        run: |
          if [ -n "$(find packages/sdk -name '*.bench.ts' -print -quit 2>/dev/null)" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No *.bench.ts files found — skipping benchmark comparison."
          fi

      - name: Install pnpm
        if: steps.detect.outputs.found == 'true'
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node.js
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20

      - name: Get pnpm store directory
        if: steps.detect.outputs.found == 'true'
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        if: steps.detect.outputs.found == 'true'
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        if: steps.detect.outputs.found == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run benchmarks on PR branch
        if: steps.detect.outputs.found == 'true'
        run: pnpm --filter stellar-lens exec vitest bench --run --reporter=json > /tmp/bench-pr.json

      - name: Checkout main branch
        if: steps.detect.outputs.found == 'true'
        run: git checkout main

      - name: Run benchmarks on main branch
        if: steps.detect.outputs.found == 'true'
        run: pnpm --filter stellar-lens exec vitest bench --run --reporter=json --passWithNoTests > /tmp/bench-main.json || echo '{}' > /tmp/bench-main.json

      - name: Compare results and check for regressions
        if: steps.detect.outputs.found == 'true'
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const main = JSON.parse(fs.readFileSync('/tmp/bench-main.json', 'utf8'));
          const pr = JSON.parse(fs.readFileSync('/tmp/bench-pr.json', 'utf8'));

          const REGRESSION_THRESHOLD = 0.20;
          let regressions = 0;
          let rows = '| Metric | Baseline (ms) | PR (ms) | Delta | Status |\n';
          rows += '|--------|--------------|---------|-------|--------|\n';

          const mainResults = {};
          const prResults = {};

          function extractResults(data, target) {
            if (data?.testResults) {
              for (const suite of data.testResults) {
                for (const bench of (suite.benchmarks || [])) {
                  target[bench.name] = bench.mean;
                }
              }
            }
          }

          extractResults(main, mainResults);
          extractResults(pr, prResults);

          for (const [name, prMean] of Object.entries(prResults)) {
            const baselineMean = mainResults[name];
            if (baselineMean === undefined) continue;
            const delta = (prMean - baselineMean) / baselineMean;
            const deltaStr = (delta >= 0 ? '+' : '') + (delta * 100).toFixed(2) + '%';
            const passed = delta <= REGRESSION_THRESHOLD;
            if (!passed) regressions++;
            rows += `| ${name} | ${baselineMean.toFixed(2)} | ${prMean.toFixed(2)} | ${deltaStr} | ${passed ? '✅' : '❌'} |\n`;
          }

          const summary = `### Benchmark Results\n\n${rows}\n${regressions > 0 ? `\n⚠️ **${regressions} regression(s) detected — threshold: 20%**` : '\n✅ No regressions detected.'}`;
          fs.writeFileSync('/tmp/bench-summary.md', summary);
          if (regressions > 0) process.exit(1);
          NODE

      - name: Post benchmark comment
        if: steps.detect.outputs.found == 'true' && always()
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: benchmark
          path: /tmp/bench-summary.md

# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Weekly scheduled security audit of all installed npm dependencies.
#           Fails if any dependency has a high or critical severity
#           vulnerability. Does not auto-fix — alerts the maintainer to act.
# Triggers: Schedule only — weekly on Wednesday at 03:00 UTC
# Paths:    None — scheduled, no path filter
# ─────────────────────────────────────────────────────────────────────────────

name: Audit

on:
  schedule:
    - cron: '0 3 * * 3'

permissions:
  contents: read

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level high

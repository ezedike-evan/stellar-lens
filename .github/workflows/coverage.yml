# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Runs Vitest with coverage enabled and posts a sticky summary
#           comment on the PR. Fails if coverage drops below threshold.
# Triggers: pull_request targeting main only
# Paths:    SDK source files, test files, this workflow file
# ─────────────────────────────────────────────────────────────────────────────

name: Coverage

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/sdk/src/**/*.ts'
      - 'packages/sdk/tests/**/*.ts'
      - '.github/workflows/coverage.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@fe02b74f3b4a5a8605f988b4c83c31faf2e897ef # v4.0.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.1.2
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm --filter stellar-lens vitest run --coverage
        env:
          VITEST_COVERAGE_LINES: 80
          VITEST_COVERAGE_FUNCTIONS: 80
          VITEST_COVERAGE_BRANCHES: 80

      - name: Upload coverage report
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68cf7e19c021d4778f0428a # v4.6.1
        if: always()
        with:
          name: coverage-report
          path: packages/sdk/coverage/
          retention-days: 7

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@52423e84c5db7ba852ec7f85ac5901c2820c65f0 # v2.9.0
        if: always()
        with:
          header: coverage
          path: packages/sdk/coverage/coverage-summary.txt

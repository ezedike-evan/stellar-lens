# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  Runs Vitest with coverage enabled and posts a sticky summary
#           comment on the PR. Fails if coverage drops below threshold.
# Triggers: pull_request targeting main only
# Paths:    SDK source files, test files, this workflow file
# ─────────────────────────────────────────────────────────────────────────────

name: Coverage

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/sdk/src/**/*.ts'
      - 'packages/sdk/tests/**/*.ts'
      - '.github/workflows/coverage.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm --filter stellar-lens vitest run --coverage
        env:
          VITEST_COVERAGE_LINES: 80
          VITEST_COVERAGE_FUNCTIONS: 80
          VITEST_COVERAGE_BRANCHES: 80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.1
        if: always()
        with:
          name: coverage-report
          path: packages/sdk/coverage/
          retention-days: 7

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v2.9.0
        if: always()
        with:
          header: coverage
          path: packages/sdk/coverage/coverage-summary.txt

name: Bug Report
description: Report a bug in StellarLens
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you can
        provide below, the faster we can reproduce and fix the issue.

        Before submitting, please confirm that this is **not** a security
        vulnerability. Security issues must be reported privately as
        described in [SECURITY.md](../blob/main/SECURITY.md).
  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Which version of `stellar-lens` are you using? Run `pnpm list stellar-lens` or check your `package.json`.
      placeholder: e.g. 0.4.2
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: e.g. v20.11.1
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      description: OS name and version.
      placeholder: e.g. macOS 14.4, Ubuntu 22.04, Windows 11
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description of the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A minimal, numbered list of steps that reliably reproduces the bug.
      placeholder: |
        1. Install stellar-lens at version X
        2. Call `client.simulate(...)` with the following arguments
        3. Observe the error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include stack traces if available.
    validations:
      required: true
  - type: textarea
    id: code-or-output
    attributes:
      label: Relevant code or error output
      description: Paste a minimal code snippet that reproduces the bug, or the relevant error output. No need for backticks — this field is rendered as code.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: not-security
    attributes:
      label: Confirmation
      description: Please confirm before submitting.
      options:
        - label: This issue is not a security vulnerability. I understand that security issues must be reported privately following [SECURITY.md](../blob/main/SECURITY.md).
          required: true
